<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        form {
            display: inline-block;
            margin: 0 auto;
        }
        label {
            display: block;
            margin-bottom: 10px;
        }
        input[type="text"], input[type="password"] {
            padding: 10px;
            width: 200px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        input[type="submit"] {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
<form action="member/login" method="post">
    <label>
        이메일:
        <input type="text" name="memberEmail" placeholder="example@example.com">
    </label>
<!--    <label>-->
<!--        비밀번호:-->
<!--        <input type="password" name="memberPassword" placeholder="********">-->
<!--    </label>-->
    <input type="submit" value="로그인">
</form>
</body>
</html>
